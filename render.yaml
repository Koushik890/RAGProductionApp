# Render Blueprint — RAG Production App
# https://render.com/docs/blueprint-spec

services:
  # ── FastAPI backend ──────────────────────────────────────────────
  - type: web
    name: rag-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MISTRAL_API_KEY
        sync: false                    # set manually in the dashboard
      - key: QDRANT_URL
        sync: false                    # e.g. https://xyz.us-east.aws.cloud.qdrant.io:6333
      - key: QDRANT_API_KEY
        sync: false                    # Qdrant Cloud API key
      - key: QDRANT_COLLECTION
        value: docs
      - key: MISTRAL_EMBED_DIM
        value: "1024"
      - key: INNGEST_PRODUCTION
        value: "true"
      - key: INNGEST_EVENT_KEY
        sync: false                    # Inngest Cloud event key
      - key: INNGEST_SIGNING_KEY
        sync: false                    # Inngest Cloud signing key
      - key: INNGEST_API_BASE
        value: "https://api.inngest.com/v1"  # Inngest Cloud API

  # ── Streamlit frontend ──────────────────────────────────────────
  - type: web
    name: rag-ui
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        value: "https://rag-api-a811.onrender.com"
